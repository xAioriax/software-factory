<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tatetí</title>
  <meta name="description" content="Tatetí moderno para dos jugadores locales con modo contra la computadora." />
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">Software Factory</p>
      <h1>Tatetí</h1>
      <p class="subtitle">Jugá clásico 3x3 contra un amigo o contra la computadora.</p>
    </header>

    <section class="panel" aria-label="Panel de juego">
      <div class="toolbar">
        <label>
          Modo
          <select id="mode">
            <option value="local">2 jugadores locales</option>
            <option value="cpu">Contra la computadora</option>
          </select>
        </label>

        <label>
          Marcás con
          <select id="playerMark" disabled>
            <option value="X">X</option>
            <option value="O">O</option>
          </select>
        </label>
      </div>

      <div class="status" id="status" role="status" aria-live="polite">Turno de X</div>

      <section class="board" id="board" aria-label="Tablero de tatetí 3x3"></section>

      <div class="actions">
        <button class="button primary" id="restart" type="button">Nueva partida</button>
        <button class="button ghost" id="resetScore" type="button">Borrar marcador</button>
      </div>
    </section>

    <section class="scoreboard" aria-label="Marcador">
      <article class="score-card">
        <span>Ganadas</span>
        <strong id="wins">0</strong>
      </article>
      <article class="score-card">
        <span>Perdidas</span>
        <strong id="losses">0</strong>
      </article>
      <article class="score-card">
        <span>Empates</span>
        <strong id="draws">0</strong>
      </article>
    </section>

    <section class="tips" aria-label="Instrucciones">
      <h2>Cómo jugar</h2>
      <p>Completá tres marcas iguales en línea horizontal, vertical o diagonal. Si se llena el tablero sin ganador, la partida termina empatada.</p>
    </section>
  </main>

  <script src="./src/app.js" type="module"></script>
</body>
</html>
